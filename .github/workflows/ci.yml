name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 */25 * *'

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        java-version: [17, 21, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn -Prun-its verify

      - name: Build artifacts
        run: mvn package -DskipTests

  example-project:
    name: Example Project Check (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin
        run: mvn install -DskipTests

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Verify optimized jar manifest
        working-directory: example-project
        run: |
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^Main-Class: me.bechberger.femtojar.rt.BundleBootstrap'
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^X-Original-Main-Class:'

      - name: Run femtojar benchmark on example project
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"
          EXAMPLE_JAR="example-project/target/demo-app.jar"

          if [ -z "${CLI_JAR}" ]; then
            echo "::error::No CLI jar found in target/. Expected 'femtojar.jar'."
            ls -la target || true
            exit 1
          fi

          if [ ! -f "${EXAMPLE_JAR}" ]; then
            echo "::error::Benchmark target jar not found: ${EXAMPLE_JAR}"
            ls -la example-project/target || true
            exit 1
          fi

          echo "Using CLI jar: ${CLI_JAR} ($(du -h ${CLI_JAR} | cut -f1))"
          echo "Benchmark target: ${EXAMPLE_JAR} ($(du -h ${EXAMPLE_JAR} | cut -f1))"
          java -jar "${CLI_JAR}" --benchmark --benchmark-format markdown --in "${EXAMPLE_JAR}" > benchmark-output.md
          {
            echo "## Benchmark Results (ubuntu-latest, Java 21)"
            echo
            cat benchmark-output.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload example artifact
        uses: actions/upload-artifact@v6
        with:
          name: example-demo-app
          path: example-project/target/demo-app-optimized.jar
          retention-days: 14

  jstall-benchmarks:
    name: JStall Release Benchmarks (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: example-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Get latest jstall release
        run: |
          RELEASE_JSON="$(mktemp)"
          curl -fsSL https://api.github.com/repos/parttimenerd/jstall/releases/latest -o "$RELEASE_JSON"
          MINIMAL_URL=$(jq -r '.assets[] | select((.name | test("jstall(-all)?-minimal.*\\.jar$")) or (.name == "jstall-minimal.jar")) | .browser_download_url' "$RELEASE_JSON" | head -1)
          FULL_URL=$(jq -r '.assets[] | select((((.name | test("jstall(-all)?.*\\.jar$")) and (.name | contains("minimal") | not)) or (.name == "jstall.jar"))) | .browser_download_url' "$RELEASE_JSON" | head -1)
          
          if [ -z "$MINIMAL_URL" ] || [ -z "$FULL_URL" ]; then
            echo "::error::Could not find jstall release artifacts"
            echo "Release payload excerpt:"
            head -40 "$RELEASE_JSON"
            exit 1
          fi
          
          echo "Downloading minimal: $MINIMAL_URL"
          curl -L -o jstall-minimal.jar "$MINIMAL_URL"
          
          echo "Downloading full: $FULL_URL"
          curl -L -o jstall-full.jar "$FULL_URL"
          
          ls -lh jstall-*.jar
          rm -f "$RELEASE_JSON"

      - name: Run benchmarks on jstall releases
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"
          
          echo "=== JStall Minimal Benchmark ===" > jstall-benchmark-output.md
          java -jar "${CLI_JAR}" --benchmark --benchmark-format markdown --in jstall-minimal.jar >> jstall-benchmark-output.md
          
          echo "" >> jstall-benchmark-output.md
          echo "=== JStall Full Benchmark ===" >> jstall-benchmark-output.md
          java -jar "${CLI_JAR}" --benchmark --benchmark-format markdown --in jstall-full.jar >> jstall-benchmark-output.md
          
          {
            echo "## JStall Release Benchmarks (ubuntu-latest, Java 21)"
            echo
            cat jstall-benchmark-output.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  condensed-data-benchmark:
    name: Condensed Data Artifact Benchmark (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: example-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Download condensed-data artifact
        run: |
          REPO="parttimenerd/condensed-data"

          # Find latest successful workflow run
          RUNS=$(curl -fsSL "https://api.github.com/repos/${REPO}/actions/runs?status=success&per_page=20")
          RUN_ID=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)
          RUN_URL=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .html_url' | head -1)

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not find a successful workflow run for ${REPO}"
            exit 1
          fi

          echo "Using run: $RUN_ID"
          echo "Run URL: $RUN_URL"
          echo "CONDENSED_DATA_RUN_URL=$RUN_URL" >> "$GITHUB_ENV"
          
          # Get artifacts list for the run
          ARTIFACTS=$(curl -fsSL https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts)
          
          # Verify the run publishes the expected artifact name.
          ARTIFACT_NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name == "condensed-data.jar") | .name' | head -1)
          
          if [ -z "$ARTIFACT_NAME" ]; then
            echo "::error::Could not find condensed-data.jar artifact in run ${RUN_ID}"
            echo "Available artifacts:"
            echo "$ARTIFACTS" | jq -r '.artifacts[]?.name' | sed 's/^/- /'
            exit 1
          fi
          
          DOWNLOAD_URL="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/condensed-data.jar.zip"
          echo "Downloading condensed-data.jar from: $DOWNLOAD_URL"
          curl -fsSL -L -o condensed-data-artifact.zip "$DOWNLOAD_URL"
          unzip -p condensed-data-artifact.zip condensed-data.jar > condensed-data.jar
          
          ls -lh condensed-data.jar

      - name: Run benchmark on condensed-data
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"
          
          java -jar "${CLI_JAR}" --benchmark --benchmark-format markdown --in condensed-data.jar > condensed-data-benchmark-output.md
          
          {
            echo "## Condensed Data Artifact Benchmark (ubuntu-latest, Java 21)"
            echo
            echo "Run: ${CONDENSED_DATA_RUN_URL}"
            echo
            cat condensed-data-benchmark-output.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  release-build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [test-matrix, example-project]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Build all artifacts
        run: mvn package -DskipTests

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-plugin
          path: target/femtojar-*.jar
          retention-days: 30

      - name: Upload cli artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-cli
          path: target/*-cli.jar
          retention-days: 30
