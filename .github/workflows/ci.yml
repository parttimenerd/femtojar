name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 */25 * *'

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        java-version: [17, 21, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn -Prun-its verify

      - name: Build artifacts
        run: mvn package -DskipTests

  example-project:
    name: Example Project Check (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin
        run: mvn install -DskipTests

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Verify optimized jar manifest
        working-directory: example-project
        run: |
          unzip -p target/demo-app-1.0-SNAPSHOT.jar META-INF/MANIFEST.MF | grep '^Main-Class: me.bechberger.femtojar.rt.BundleBootstrap'
          unzip -p target/demo-app-1.0-SNAPSHOT.jar META-INF/MANIFEST.MF | grep '^X-Original-Main-Class:'

      - name: Run femtojar benchmark on example project
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"
          EXAMPLE_JAR="example-project/target/demo-app.jar"

          if [ -z "${CLI_JAR}" ]; then
            echo "::error::No CLI jar found in target/. Expected 'femtojar.jar'."
            ls -la target || true
            exit 1
          fi

          if [ ! -f "${EXAMPLE_JAR}" ]; then
            echo "::error::Benchmark target jar not found: ${EXAMPLE_JAR}"
            ls -la example-project/target || true
            exit 1
          fi

          echo "Using CLI jar: ${CLI_JAR} ($(du -h ${CLI_JAR} | cut -f1))"
          echo "Benchmark target: ${EXAMPLE_JAR} ($(du -h ${EXAMPLE_JAR} | cut -f1))"
          java -jar "${CLI_JAR}" --benchmark --benchmark-format markdown --in "${EXAMPLE_JAR}" > benchmark-output.md
          {
            echo "## Benchmark Results (ubuntu-latest, Java 21)"
            echo
            cat benchmark-output.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload example artifact
        uses: actions/upload-artifact@v4
        with:
          name: example-demo-app
          path: example-project/target/demo-app-1.0-SNAPSHOT.jar
          retention-days: 14

  release-build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [test-matrix, example-project]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Build all artifacts
        run: mvn package -DskipTests

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: femtojar-plugin
          path: target/femtojar-*.jar
          retention-days: 30

      - name: Upload cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: femtojar-cli
          path: target/*-cli.jar
          retention-days: 30
