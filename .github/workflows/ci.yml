name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 */25 * *'

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        java-version: [17, 21, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn -Prun-its verify

      - name: Build artifacts
        run: mvn package -DskipTests

  example-project:
    name: Example Project Check (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin
        run: mvn install -DskipTests

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Verify optimized jar manifest
        working-directory: example-project
        run: |
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^Main-Class: me.bechberger.femtojar.rt.BundleBootstrap'
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^X-Original-Main-Class:'

      - name: Upload example artifact
        uses: actions/upload-artifact@v6
        with:
          name: example-demo-app
          path: example-project/target/demo-app-optimized.jar
          retention-days: 14

  benchmarks:
    name: Benchmarks (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: example-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin and build artifacts
        run: |
          mvn install -DskipTests
          mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Get latest jstall release
        run: |
          RELEASE_JSON="$(mktemp)"
          curl -fsSL https://api.github.com/repos/parttimenerd/jstall/releases/latest -o "$RELEASE_JSON"
          MINIMAL_URL=$(jq -r '.assets[] | select((.name | test("jstall(-all)?-minimal.*\\.jar$")) or (.name == "jstall-minimal.jar")) | .browser_download_url' "$RELEASE_JSON" | head -1)
          FULL_URL=$(jq -r '.assets[] | select((((.name | test("jstall(-all)?.*\\.jar$")) and (.name | contains("minimal") | not)) or (.name == "jstall.jar"))) | .browser_download_url' "$RELEASE_JSON" | head -1)
          
          if [ -z "$MINIMAL_URL" ] || [ -z "$FULL_URL" ]; then
            echo "::error::Could not find jstall release artifacts"
            echo "Release payload excerpt:"
            head -40 "$RELEASE_JSON"
            exit 1
          fi
          
          echo "Downloading minimal: $MINIMAL_URL"
          curl -L -o jstall-minimal.jar "$MINIMAL_URL"
          
          echo "Downloading full: $FULL_URL"
          curl -L -o jstall-full.jar "$FULL_URL"
          
          ls -lh jstall-*.jar
          rm -f "$RELEASE_JSON"

      - name: Download condensed-data artifact
        run: |
          REPO="parttimenerd/condensed-data"

          # Find latest successful workflow run
          RUNS=$(curl -fsSL "https://api.github.com/repos/${REPO}/actions/runs?status=success&per_page=20")
          RUN_ID=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)
          RUN_URL=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .html_url' | head -1)

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not find a successful workflow run for ${REPO}"
            exit 1
          fi

          echo "Using run: $RUN_ID"
          echo "Run URL: $RUN_URL"
          echo "CONDENSED_DATA_RUN_URL=$RUN_URL" >> "$GITHUB_ENV"
          
          # Get artifacts list for the run
          ARTIFACTS=$(curl -fsSL https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts)
          
          # Verify the run publishes the expected artifact name.
          ARTIFACT_NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name == "condensed-data.jar") | .name' | head -1)
          
          if [ -z "$ARTIFACT_NAME" ]; then
            echo "::error::Could not find condensed-data.jar artifact in run ${RUN_ID}"
            echo "Available artifacts:"
            echo "$ARTIFACTS" | jq -r '.artifacts[]?.name' | sed 's/^/- /'
            exit 1
          fi
          
          DOWNLOAD_URL="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/condensed-data.jar.zip"
          PLATFORM_URL="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/platform-jars.zip"
          echo "Downloading condensed-data.jar from: $DOWNLOAD_URL"
          curl -fsSL -L -o condensed-data-artifact.zip "$DOWNLOAD_URL"
          unzip -p condensed-data-artifact.zip condensed-data.jar > condensed-data.jar

          echo "Downloading platform jars from: $PLATFORM_URL"
          curl -fsSL -L -o platform-jars.zip "$PLATFORM_URL"
          python3 <<'ENDPYTHON'
          from zipfile import ZipFile
          from pathlib import Path

          targets = {
              "condensed-data-linux-amd64.jar",
              "condensed-data-linux-amd64-inflaterless.jar",
          }
          with ZipFile("platform-jars.zip", "r") as zf:
              names = zf.namelist()
              for target in targets:
                  matched = [n for n in names if n.endswith("/" + target) or n == target]
                  if not matched:
                      raise SystemExit(f"Missing {target} in platform-jars.zip")
                  with zf.open(matched[0], "r") as src, open(target, "wb") as out:
                      out.write(src.read())
                  print(f"Extracted {target}")
          ENDPYTHON
          
          ls -lh condensed-data.jar condensed-data-linux-amd64.jar condensed-data-linux-amd64-inflaterless.jar

      - name: Run benchmarks and create summary tables
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"

          if [ -z "${CLI_JAR}" ]; then
            echo "::error::No CLI jar found in target/. Expected 'femtojar.jar'."
            ls -la target || true
            exit 1
          fi

          java -jar "${CLI_JAR}" example-project/target/demo-app.jar --benchmark --benchmark-format json \
            --proguard-config example-project/proguard.conf > demo-app.json &
          PID_DEMO=$!

          java -jar "${CLI_JAR}" jstall-full.jar --benchmark --benchmark-format json \
            --proguard-options "-keep class me.bechberger.jstall.cli.**" \
            --proguard-options "-keepclassmembers class me.bechberger.jstall.cli.**" \
            --proguard-options "-dontwarn" > jstall.json &
          PID_JSTALL=$!

          java -jar "${CLI_JAR}" jstall-minimal.jar --benchmark --benchmark-format json \
            --proguard-options "-keep class me.bechberger.jstall.cli.**" \
            --proguard-options "-keepclassmembers class me.bechberger.jstall.cli.**" \
            --proguard-options "-dontwarn" > jstall-minimal.json &
          PID_JSTALL_MIN=$!

          java -jar "${CLI_JAR}" condensed-data.jar --benchmark --benchmark-format json \
            --proguard-options "-dontwarn" \
            --proguard-options "-keep class **.cli.** { *; }" > condensed-data.json &
          PID_CD=$!

          java -jar "${CLI_JAR}" condensed-data-linux-amd64.jar --benchmark --benchmark-format json \
            --proguard-options "-dontwarn" \
            --proguard-options "-keep class **.cli.** { *; }" > condensed-data-linux-amd64.json &
          PID_CD_AMD64=$!

          java -jar "${CLI_JAR}" condensed-data-linux-amd64-inflaterless.jar --benchmark --benchmark-format json \
            --proguard-options "-dontwarn" \
            --proguard-options "-keep class **.cli.** { *; }" > condensed-data-linux-amd64-inflaterless.json &
          PID_CD_INFLATERLESS=$!

          echo "Waiting for all benchmarks to complete..."
          FAIL=0
          for PID in $PID_DEMO $PID_JSTALL $PID_JSTALL_MIN $PID_CD $PID_CD_AMD64 $PID_CD_INFLATERLESS; do
            wait "$PID" || FAIL=1
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::warning::One or more benchmark processes exited with non-zero status"
          fi

          python3 <<'ENDPYTHON' > benchmark-summary.md
          import json

          mode_order = [
              "max",
              "zopfli",
              "default",
              "proguard max",
              "proguard zopfli",
              "proguard default",
              "proguard",
          ]

          columns = [
              ("demo-app.jar", "demo-app.json"),
              ("jstall", "jstall.json"),
              ("jstall-minimal", "jstall-minimal.json"),
              ("condensed-data.jar", "condensed-data.json"),
              ("condensed-data-linux-amd64.jar", "condensed-data-linux-amd64.json"),
              ("condensed-data-linux-amd64-inflaterless.jar", "condensed-data-linux-amd64-inflaterless.json"),
          ]

          data = {}
          for _, path in columns:
              with open(path, "r", encoding="utf-8") as f:
                  doc = json.load(f)
              rows = {r["mode"]: r for r in doc["results"]}
              data[path] = {
                  "doc": doc,
                  "rows": rows,
              }

          print("## Benchmark Results (ubuntu-latest, Java 21)")
          print()
          for label, path in columns:
              doc = data[path]["doc"]
              print(f"- input: `{doc['input']}`")
              print(f"- original size: `{doc['originalSize']}` bytes")
              print(f"- best-reduction: `{doc['bestMode']}` ({doc['bestReductionPercent']:.2f}%) in {doc['bestTimeSeconds']}s")
              print()

          print("### Reduction (%)")
          print()
          header = "| reduction | " + " | ".join(label for label, _ in columns) + " |"
          sep = "| --- | " + " | ".join(["---:"] * len(columns)) + " |"
          print(header)
          print(sep)
          for mode in mode_order:
              values = []
              for _, path in columns:
                  row = data[path]["rows"].get(mode)
                  if row is None or row.get("failed"):
                      values.append("failed")
                  else:
                      values.append(f"{row['savedPercent']:.2f}%")
              print("| " + mode + " | " + " | ".join(values) + " |")

          print()
          print("### Time (s)")
          print()
          print("| time | " + " | ".join(label for label, _ in columns) + " |")
          print(sep)
          for mode in mode_order:
              values = []
              for _, path in columns:
                  row = data[path]["rows"].get(mode)
                  if row is None or row.get("failed"):
                      values.append("failed")
                  else:
                      values.append(f"{row['elapsedSeconds']:.2f}")
              print("| " + mode + " | " + " | ".join(values) + " |")
          ENDPYTHON

          {
            cat benchmark-summary.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  release-build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [test-matrix, example-project]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Build all artifacts
        run: mvn package -DskipTests

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-plugin
          path: target/femtojar-*.jar
          retention-days: 30

      - name: Upload cli artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-cli
          path: target/*-cli.jar
          retention-days: 30
