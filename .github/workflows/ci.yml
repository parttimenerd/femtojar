name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 */25 * *'

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            java-version: 17
          - os: ubuntu-latest
            java-version: 21
          - os: ubuntu-latest
            java-version: 25
          - os: macos-latest
            java-version: 21

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn -Prun-its verify

      - name: Build artifacts
        run: mvn package -DskipTests

  example-project:
    name: Example Project Check (macOS, Java 21)
    runs-on: macos-latest
    needs: test-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin
        run: mvn install -DskipTests

      - name: Build CLI artifact for benchmark
        run: mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Verify optimized jar manifest
        working-directory: example-project
        run: |
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^Main-Class: me.bechberger.femtojar.rt.BundleBootstrap'
          unzip -p target/demo-app-optimized.jar META-INF/MANIFEST.MF | grep '^X-Original-Main-Class:'

      - name: Upload example artifact
        uses: actions/upload-artifact@v6
        with:
          name: example-demo-app
          path: example-project/target/demo-app-optimized.jar
          retention-days: 14

  benchmarks:
    name: Benchmarks (Ubuntu, Java 21)
    runs-on: ubuntu-latest
    needs: example-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Install plugin and build artifacts
        run: |
          mvn install -DskipTests
          mvn package -DskipTests

      - name: Build example project
        working-directory: example-project
        run: mvn package

      - name: Get latest jstall release
        run: |
          RELEASE_JSON="$(mktemp)"
          curl -fsSL https://api.github.com/repos/parttimenerd/jstall/releases/latest -o "$RELEASE_JSON"
          MINIMAL_URL=$(jq -r '.assets[] | select((.name | test("jstall(-all)?-minimal.*\\.jar$")) or (.name == "jstall-minimal.jar")) | .browser_download_url' "$RELEASE_JSON" | head -1)
          FULL_URL=$(jq -r '.assets[] | select((((.name | test("jstall(-all)?.*\\.jar$")) and (.name | contains("minimal") | not)) or (.name == "jstall.jar"))) | .browser_download_url' "$RELEASE_JSON" | head -1)
          
          if [ -z "$MINIMAL_URL" ] || [ -z "$FULL_URL" ]; then
            echo "::error::Could not find jstall release artifacts"
            echo "Release payload excerpt:"
            head -40 "$RELEASE_JSON"
            exit 1
          fi
          
          echo "Downloading minimal: $MINIMAL_URL"
          curl -L -o jstall-minimal.jar "$MINIMAL_URL"
          
          echo "Downloading full: $FULL_URL"
          curl -L -o jstall-full.jar "$FULL_URL"
          
          ls -lh jstall-*.jar
          rm -f "$RELEASE_JSON"

      - name: Download condensed-data artifact
        run: |
          REPO="parttimenerd/condensed-data"

          # Find latest successful workflow run
          RUNS=$(curl -fsSL "https://api.github.com/repos/${REPO}/actions/runs?status=success&per_page=20")
          RUN_ID=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)
          RUN_URL=$(echo "$RUNS" | jq -r '.workflow_runs[] | select(.conclusion == "success") | .html_url' | head -1)

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not find a successful workflow run for ${REPO}"
            exit 1
          fi

          echo "Using run: $RUN_ID"
          echo "Run URL: $RUN_URL"
          echo "CONDENSED_DATA_RUN_URL=$RUN_URL" >> "$GITHUB_ENV"
          
          # Get artifacts list for the run
          ARTIFACTS=$(curl -fsSL https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts)
          
          # Verify the run publishes the expected artifact name.
          ARTIFACT_NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name == "condensed-data.jar") | .name' | head -1)
          
          if [ -z "$ARTIFACT_NAME" ]; then
            echo "::error::Could not find condensed-data.jar artifact in run ${RUN_ID}"
            echo "Available artifacts:"
            echo "$ARTIFACTS" | jq -r '.artifacts[]?.name' | sed 's/^/- /'
            exit 1
          fi
          
          DOWNLOAD_URL="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/condensed-data.jar.zip"
          PLATFORM_URL="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/platform-jars.zip"
          echo "Downloading condensed-data.jar from: $DOWNLOAD_URL"
          curl -fsSL -L -o condensed-data-artifact.zip "$DOWNLOAD_URL"
          unzip -p condensed-data-artifact.zip condensed-data.jar > condensed-data.jar

          echo "Downloading platform jars from: $PLATFORM_URL"
          curl -fsSL -L -o platform-jars.zip "$PLATFORM_URL"
          python3 <<'ENDPYTHON'
          from zipfile import ZipFile
          from pathlib import Path

          targets = {
              "condensed-data-linux-amd64.jar",
              "condensed-data-linux-amd64-inflaterless.jar",
          }
          with ZipFile("platform-jars.zip", "r") as zf:
              names = zf.namelist()
              for target in targets:
                  matched = [n for n in names if n.endswith("/" + target) or n == target]
                  if not matched:
                      raise SystemExit(f"Missing {target} in platform-jars.zip")
                  with zf.open(matched[0], "r") as src, open(target, "wb") as out:
                      out.write(src.read())
                  print(f"Extracted {target}")
          ENDPYTHON
          
          ls -lh condensed-data.jar condensed-data-linux-amd64.jar condensed-data-linux-amd64-inflaterless.jar

      - name: Run benchmarks and create summary tables
        run: |
          CLI_JAR="$(find target -maxdepth 1 -type f -name 'femtojar.jar')"

          if [ -z "${CLI_JAR}" ]; then
            echo "::error::No CLI jar found in target/. Expected 'femtojar.jar'."
            ls -la target || true
            exit 1
          fi

          COMPRESSION_MODES=(default zopfli)
          BENCH_CASES=(
            "demo-app|example-project/target/demo-app.jar|demo-app.json|demo-app.log|demo-app"
            "jstall|jstall-full.jar|jstall.json|jstall.log|jstall"
            "jstall-min|jstall-minimal.jar|jstall-minimal.json|jstall-minimal.log|jstall"
            "condensed-data|condensed-data.jar|condensed-data.json|condensed-data.log|condensed"
            "cd-amd64|condensed-data-linux-amd64.jar|condensed-data-linux-amd64.json|condensed-data-linux-amd64.log|condensed"
            "cd-inflaterless|condensed-data-linux-amd64-inflaterless.jar|condensed-data-linux-amd64-inflaterless.json|condensed-data-linux-amd64-inflaterless.log|condensed"
          )

          set_pg_args() {
            local profile="$1"
            PG_ARGS=()
            case "$profile" in
              demo-app)
                PG_ARGS=(--proguard-config example-project/proguard.conf)
                ;;
              jstall)
                PG_ARGS=(
                  --proguard-options "-keep class me.bechberger.jstall.cli.**"
                  --proguard-options "-keepclassmembers class me.bechberger.jstall.cli.**"
                  --proguard-options "-dontwarn"
                )
                ;;
              condensed)
                PG_ARGS=(
                  --proguard-options "-dontwarn"
                  --proguard-options "-keep class **.cli.** { *; }"
                )
                ;;
            esac
          }

          echo "Generating jars for each compression mode (including ProGuard variants) and checking --help exit codes..."
          mkdir -p generated-help-check
          for CASE in "${BENCH_CASES[@]}"; do
            IFS='|' read -r LABEL INPUT_JAR JSON_PATH LOG_PATH PG_PROFILE <<< "$CASE"
            BASE_NAME="$(basename "$INPUT_JAR" .jar)"
            set_pg_args "$PG_PROFILE"
            for MODE in "${COMPRESSION_MODES[@]}"; do
              OUTPUT_JAR="generated-help-check/${BASE_NAME}-${MODE}.jar"
              echo "Generating $OUTPUT_JAR from $INPUT_JAR with --compression $MODE"
              java -jar "${CLI_JAR}" "$INPUT_JAR" "$OUTPUT_JAR" --compression "$MODE" > /dev/null
              echo "--help check: $OUTPUT_JAR"
              java -jar "$OUTPUT_JAR" --help > /dev/null

              PROGUARD_OUTPUT_JAR="generated-help-check/${BASE_NAME}-${MODE}-proguard.jar"
              echo "Generating $PROGUARD_OUTPUT_JAR from $INPUT_JAR with --compression $MODE --proguard"
              java -jar "${CLI_JAR}" "$INPUT_JAR" "$PROGUARD_OUTPUT_JAR" --compression "$MODE" --proguard "${PG_ARGS[@]}" > /dev/null
              echo "--help check: $PROGUARD_OUTPUT_JAR"
              java -jar "$PROGUARD_OUTPUT_JAR" --help > /dev/null
            done
          done

          : > benchmark-cases.tsv
          PIDS=()
          echo "Starting benchmark runs..."
          for CASE in "${BENCH_CASES[@]}"; do
            IFS='|' read -r LABEL INPUT_JAR JSON_PATH LOG_PATH PG_PROFILE <<< "$CASE"
            set_pg_args "$PG_PROFILE"
            printf '%s|%s\n' "$LABEL" "$JSON_PATH" >> benchmark-cases.tsv
            java -jar "${CLI_JAR}" "$INPUT_JAR" --benchmark --benchmark-format json "${PG_ARGS[@]}" > "$JSON_PATH" 2> "$LOG_PATH" &
            PIDS+=("$!")
          done

          echo "Waiting for all benchmarks to complete..."
          FAIL=0
          for PID in "${PIDS[@]}"; do
            wait "$PID" || FAIL=1
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::warning::One or more benchmark processes exited with non-zero status"
          fi

          echo "--- Benchmark logs ---"
          for CASE in "${BENCH_CASES[@]}"; do
            IFS='|' read -r LABEL INPUT_JAR JSON_PATH LOG_PATH PG_PROFILE <<< "$CASE"
            if [ -s "$LOG_PATH" ]; then
              echo "=== $LOG_PATH ==="
              cat "$LOG_PATH"
            fi
          done

          python3 <<'ENDPYTHON' > benchmark-summary.md
          import json, os, sys

          columns = []
          with open("benchmark-cases.tsv", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  label, path = line.split("|", 1)
                  columns.append((label, path))

          data = {}
          for label, path in columns:
              try:
                  if os.path.getsize(path) == 0:
                      raise ValueError("empty file")
                  with open(path, "r", encoding="utf-8") as f:
                      doc = json.load(f)
                  rows = {r["mode"]: r for r in doc["results"]}
                  data[label] = {"doc": doc, "rows": rows}
              except Exception as e:
                  print(f"<!-- WARNING: {path}: {e} -->", file=sys.stderr)
                  data[label] = {
                      "doc": {
                          "input": path,
                          "originalSize": 0,
                          "bestMode": "none",
                          "bestReductionPercent": 0.0,
                          "bestTimeSeconds": 0,
                          "results": [],
                      },
                      "rows": {},
                  }

          mode_order = []
          seen_modes = set()
          for label, _ in columns:
              for row in data[label]["doc"].get("results", []):
                  mode = row.get("mode")
                  if mode and mode not in seen_modes:
                      seen_modes.add(mode)
                      mode_order.append(mode)

          print("## Benchmark Results\n")
          for label, _ in columns:
              doc = data[label]["doc"]
              size = doc["originalSize"]
              size_mb = size / (1024 * 1024)
              bm = doc["bestMode"]
              if bm == "none":
                best_str = f"{size_mb:.3f} MB, best-size: all failed"
              else:
                  pct = doc["bestReductionPercent"]
                  reduced_mb = (size * pct / 100.0) / (1024 * 1024)
                  t = doc["bestTimeSeconds"]
                best_str = f"{size_mb:.3f} MB, best-size: {bm} ({pct:.1f}%, reduced {reduced_mb:.3f} MB), mode-time {t}s"
              print(f"- **{label}**: {best_str}")
          print()

          col_labels = [label for label, _ in columns]
          header = "| mode | " + " | ".join(col_labels) + " |"
          sep = "| --- | " + " | ".join(["---:"] * len(columns)) + " |"

          print("### Reduction (%)\n")
          print(header)
          print(sep)
          mode_order_with_none = ["none"] + mode_order
          for mode in mode_order_with_none:
              vals = []
              for label, _ in columns:
                  if mode == "none":
                      vals.append("0.0")
                  else:
                      row = data[label]["rows"].get(mode)
                      if row is None or row.get("failed"):
                          vals.append("--")
                      else:
                          vals.append(f"{row['savedPercent']:.1f}")
              print("| " + mode + " | " + " | ".join(vals) + " |")

          print()
          print("### Reduced Size (MB)\n")
          print(header)
          print(sep)
          for mode in mode_order_with_none:
              vals = []
              for label, _ in columns:
                  if mode == "none":
                      vals.append(f"{data[label]['doc']['originalSize'] / (1024 * 1024):.3f}")
                  else:
                      row = data[label]["rows"].get(mode)
                      if row is None or row.get("failed"):
                          vals.append("--")
                      else:
                          vals.append(f"{row['sizeBytes'] / (1024 * 1024):.3f}")
              print("| " + mode + " | " + " | ".join(vals) + " |")

          print()
          print("### Time (s)\n")
          print(header)
          print(sep)
          for mode in mode_order:
              vals = []
              for label, _ in columns:
                  row = data[label]["rows"].get(mode)
                  if row is None or row.get("failed"):
                      vals.append("--")
                  else:
                      vals.append(f"{row['elapsedSeconds']:.1f}")
              print("| " + mode + " | " + " | ".join(vals) + " |")
          ENDPYTHON

          {
            cat benchmark-summary.md
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  release-build:
    name: Build Release Artifacts
    runs-on: macos-latest
    needs: [test-matrix, example-project]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: sapmachine
          cache: maven

      - name: Build all artifacts
        run: mvn package -DskipTests

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-plugin
          path: target/femtojar-*.jar
          retention-days: 30

      - name: Upload cli artifact
        uses: actions/upload-artifact@v6
        with:
          name: femtojar-cli
          path: target/femtojar.jar
          retention-days: 30
